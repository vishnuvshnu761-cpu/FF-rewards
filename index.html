<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tervo Store</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:black;
position:fixed;
width:100%;
top:0;
z-index:100;
}

.logo{
font-size:28px;
font-weight:bold;
color:red;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
transition:0.3s;
}

nav a:hover{
color:red;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1521572267360-ee0c2909d518');
background-size:cover;
background-position:center;
}

.hero h1{
font-size:60px;
}

.hero p{
margin:20px 0;
font-size:18px;
}

.btn{
padding:12px 30px;
background:red;
color:white;
text-decoration:none;
border-radius:8px;
transition:0.3s;
}

.btn:hover{
background:white;
color:black;
}

.products{
padding:100px 50px;
text-align:center;
}

.products h2{
margin-bottom:40px;
font-size:40px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin:15px 0;
}

footer{
padding:30px;
text-align:center;
background:black;
margin-top:50px;
}
</style>
</head>
<body>

<header>
<div class="logo">TERVO</div>
<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<div>
<h1>Wear Your Identity</h1>
<p>Crafted to make your outfit worthy.</p>
<a href="#" class="btn">Shop Now</a>
</div>
</section>

<section class="products">
<h2>New Drops</h2>
<div class="product-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723" alt="">
<h3>Oversized Tee</h3>
<p>₹799</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" alt="">
<h3>Anime Tee</h3>
<p>₹899</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb" alt="">
<h3>Street Hoodie</h3>
<p>₹1299</p>
</div>

</div>
</section>

<footer>
<p>© 2026 Tervo Store. All Rights Reserved.</p>
</footer>

</body>
</html>
