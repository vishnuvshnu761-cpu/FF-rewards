<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tervo Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
-webkit-touch-callout:none;
-webkit-user-select:none;
user-select:none;
}

body{
background:
radial-gradient(circle at top right, rgba(185,212,78,0.12), transparent 35%),
radial-gradient(circle at bottom left, rgba(185,212,78,0.08), transparent 30%),
linear-gradient(180deg,#050505 0%, #0a0f05 40%, #111707 100%);
color:white;
}

.top-strip{
width:100%;
background:#111;
overflow:hidden;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.top-strip-content{
display:flex;
width:max-content;
animation:run 10s linear infinite;
}

.top-strip-content span{
color:#b9d44e;
font-size:14px;
font-weight:bold;
white-space:nowrap;
padding-right:50px;
}

@keyframes run{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

.container{
width:90%;
max-width:700px;
margin:auto;
padding:30px 0;
}

.badge{
display:inline-block;
padding:10px 18px;
border:1px solid #b9d44e;
border-radius:30px;
color:#b9d44e;
margin-bottom:20px;
font-weight:bold;
}

h1{
font-size:70px;
line-height:70px;
font-weight:900;
}

.green{
color:#b9d44e;
}

.tag{
font-size:28px;
font-weight:bold;
margin:20px 0;
}

.main-shirt{
width:100%;
max-width:500px;
display:block;
margin:25px auto;
border-radius:20px;
}

.gallery{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:25px;
}

.gallery img{
width:90px;
border-radius:15px;
cursor:pointer;
border:2px solid transparent;
transition:.3s;
}

.gallery img:hover{
border-color:#b9d44e;
transform:scale(1.05);
}

.size-box{
display:flex;
gap:12px;
margin:25px 0;
flex-wrap:wrap;
}

.size{
width:60px;
height:60px;
display:flex;
justify-content:center;
align-items:center;
border:2px solid #b9d44e;
border-radius:12px;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:.3s;
background:transparent;
color:white;
}

.size.active{
background:#b9d44e;
color:black;
}

.price-box{
margin:20px 0;
text-align:center;
}

.price-box h2{
font-size:42px;
color:#b9d44e;
font-weight:bold;
}

.price-box span{
font-size:24px;
color:#777;
text-decoration:line-through;
margin-left:10px;
}

.price-box p{
color:#ffcc00;
margin-top:8px;
font-size:16px;
font-weight:bold;
}

.cart-btn{
width:100%;
padding:20px;
font-size:26px;
font-weight:bold;
background:linear-gradient(135deg,#b9d44e,#d4ff5c);
border:none;
border-radius:18px;
cursor:pointer;
box-shadow:0 0 25px #b9d44e;
margin:25px 0;
transition:.3s;
}

.cart-btn:hover{
transform:scale(1.03);
}

.desc{
font-size:20px;
color:#aaa;
line-height:1.6;
margin-bottom:30px;
}

.feature{
display:flex;
align-items:center;
gap:15px;
margin:20px 0;
padding-bottom:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.feature-icon{
font-size:28px;
color:#b9d44e;
}

.feature-text h3{
font-size:20px;
}

.feature-text p{
color:#999;
font-size:15px;
margin-top:5px;
}

.box{
background:linear-gradient(180deg,#111,#0b0f08);
padding:20px;
border-radius:20px;
margin-top:30px;
border:1px solid rgba(255,255,255,0.06);
}

.box h2{
color:#b9d44e;
margin-bottom:20px;
}

.detail{
display:flex;
justify-content:space-between;
margin:12px 0;
color:#ccc;
}

.review{
margin:20px 0;
}

.bar{
width:100%;
height:8px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.fill{
height:100%;
}

.rating-card{
background:linear-gradient(135deg,#7fa22f,#b9d44e);
padding:30px;
border-radius:20px;
text-align:center;
margin-bottom:25px;
color:black;
}

.rating-card h1{
font-size:70px;
line-height:70px;
}

.rating-card p{
margin-top:10px;
font-size:22px;
}

.testimonial{
background:#111;
padding:15px;
border-radius:15px;
margin:15px 0;
border:1px solid #222;
}

.input-box{
width:100%;
padding:16px;
margin:10px 0;
border-radius:12px;
border:1px solid #333;
background:#0f0f0f;
color:white;
font-size:16px;
outline:none;
}

.input-box:focus{
border-color:#b9d44e;
}

/* Success Popup */
.success-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
backdrop-filter:blur(8px);
}

.success-box{
width:320px;
background:linear-gradient(135deg,#111,#1c250d);
border:2px solid #b9d44e;
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 0 30px rgba(185,212,78,.4);
animation:popupScale .5s ease;
}

.success-logo{
font-size:28px;
font-weight:bold;
color:#b9d44e;
margin-bottom:20px;
}

.success-check{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:linear-gradient(135deg,#b9d44e,#d4ff5c);
display:flex;
justify-content:center;
align-items:center;
font-size:45px;
font-weight:bold;
color:black;
animation:bounce .8s ease;
}

.success-box h2{
margin:20px 0 10px;
font-size:28px;
}

.success-box p{
color:#aaa;
font-size:16px;
}

@keyframes popupScale{
0%{transform:scale(.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes bounce{
0%{transform:scale(0);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}
</style>
</head>
<body>

<div class="top-strip">
<div class="top-strip-content">
<span>🚚 Cash on Delivery • Free Shipping</span>
<span>🚚 Cash on Delivery • Free Shipping</span>
<span>🚚 Cash on Delivery • Free Shipping</span>
</div>
</div>

<div class="container">
<!-- Your full existing content stays same -->
<!-- Keep your product, checkout, reviews, etc. exactly here -->
</div>

<!-- Success Popup -->
<div id="successPopup" class="success-popup">
<div class="success-box">
<div class="success-logo">TERVO STORE</div>
<div class="success-check">✔</div>
<h2>Order Successful</h2>
<p>Your order has been placed successfully.</p>
<p>Thank you for shopping with us ❤️</p>
</div>
</div>

<script>
let quantity = 1;

function changeImage(src){
document.getElementById("mainImage").src = src;
}

function selectSize(el){
document.querySelectorAll('.container > .size-box .size').forEach(btn=>{
btn.classList.remove('active');
});
el.classList.add('active');
}

function selectCheckoutSize(el){
document.querySelectorAll('#checkoutPage .size').forEach(btn=>{
if(btn.id !== "qtyBox" && btn.innerText !== "+" && btn.innerText !== "-"){
btn.classList.remove('active');
}
});
el.classList.add('active');
}

function increaseQty(){
quantity++;
document.getElementById("qtyBox").innerText = quantity;
}

function decreaseQty(){
if(quantity > 1){
quantity--;
document.getElementById("qtyBox").innerText = quantity;
}
}

function showCheckout(){
document.getElementById("checkoutPage").style.display="block";
document.getElementById("checkoutPage").scrollIntoView({behavior:"smooth"});
}

function placeOrder(){
let inputs=document.querySelectorAll(".input-box");
let selectedSize=document.querySelector("#checkoutPage .size.active").innerText;

for(let i=0;i<inputs.length;i++){
if(inputs[i].value.trim()===""){
alert("⚠ Please fill all fields");
return;
}
}

if(inputs[1].value.length < 10){
alert("⚠ Enter valid phone number");
return;
}

if(inputs[2].value.length < 6){
alert("⚠ Enter valid pincode");
return;
}

let message =
"🛒 New Order%0A%0A"+
"👕 Size: "+selectedSize+"%0A"+
"📦 Quantity: "+quantity+"%0A"+
"👤 Name: "+inputs[0].value+"%0A"+
"📞 Phone: "+inputs[1].value+"%0A"+
"📍 Pincode: "+inputs[2].value+"%0A"+
"🏠 House: "+inputs[3].value+"%0A"+
"📌 Address: "+inputs[4].value+"%0A"+
"🏙 City: "+inputs[5].value+"%0A"+
"🌍 State: "+inputs[6].value;

fetch("https://api.telegram.org/botYOURTOKEN/sendMessage?chat_id=YOURCHATID&text="+message)
.then(()=>{
document.getElementById("successPopup").style.display="flex";

setTimeout(()=>{
document.getElementById("successPopup").style.display="none";
},4000);
})
.catch(()=>{
alert("❌ Failed to place order");
});
}
</script>

</body>
</html>
