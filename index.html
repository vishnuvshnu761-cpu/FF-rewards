<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tervo Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#050505;
    color:white;
}
.container{
    width:90%;
    margin:auto;
    padding:40px 0;
}
.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    min-height:100vh;
}
.left,.right{
    width:45%;
}
.left{
    animation:fadeUp 1.2s ease;
}
.badge{
    display:inline-block;
    border:1px solid #b9d44e;
    padding:10px 20px;
    border-radius:40px;
    color:#b9d44e;
    margin-bottom:20px;
}
h1{
    font-size:90px;
}
h1 span{
    color:#b9d44e;
}
.tag{
    font-size:30px;
    margin:20px 0;
}
.desc{
    color:#bbb;
    margin-bottom:30px;
}
.feature{
    margin:12px 0;
}
.main-shirt{
    width:400px;
    animation:float 4s infinite ease-in-out;
}
.gallery{
    display:flex;
    gap:15px;
    margin-top:20px;
}
.gallery img{
    width:100px;
    border-radius:10px;
    cursor:pointer;
}
.gallery img:hover{
    transform:scale(1.1);
}
.cart-btn{
    margin-top:30px;
    padding:20px 40px;
    background:#b9d44e;
    border:none;
    border-radius:15px;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 0 20px #b9d44e;
}
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}
@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}
@media(max-width:768px){
    .left,.right{
        width:100%;
    }
    h1{
        font-size:55px;
    }
    .main-shirt{
        width:280px;
    }
}
</style>
</head>
<body>

<div class="container">
<div class="hero">

<div class="left">
    <div class="badge">NEW ARRIVAL</div>
    <h1>BREAK <span>RULES</span></h1>
    <p class="tag">NOT YOUR LIMITS</p>
    <p class="desc">Premium oversized streetwear for rule breakers.</p>

    <div class="feature">✔ Premium Cotton</div>
    <div class="feature">✔ Oversized Fit</div>
    <div class="feature">✔ Fade Resistant</div>

    <button class="cart-btn">ADD TO CART</button>
</div>

<div class="right">
    <img id="mainImage" class="main-shirt" src="./back.png">

    <div class="gallery">
        <img src="./front.png" onclick="changeImage('./front.png')">
        <img src="./back.png" onclick="changeImage('./back.png')">
        <img src="./main.png" onclick="changeImage('./main.png')">
    </div>
</div>

</div>
</div>

<script>
function changeImage(src){
    document.getElementById("mainImage").src = src;
}

let images = ["./front.png","./back.png","./main.png"];
let index = 0;

setInterval(()=>{
    index = (index + 1) % images.length;
    document.getElementById("mainImage").src = images[index];
},3000);
</script>

</body>
</html>
